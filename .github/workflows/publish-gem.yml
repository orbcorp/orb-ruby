# This workflow is triggered when a GitHub release is created.
# It can also be run manually to re-publish to rubygems.org in case it failed for some reason.
# You can run this workflow by navigating to https://www.github.com/orbcorp/orb-ruby/actions/workflows/publish-gem.yml
name: Publish Gem
on:
  workflow_dispatch:

  release:
    types: [published]

permissions:
  contents: read
  # Trusted Publishing: rubygems.org authenticates via the Actions OIDC token
  # instead of a stored GEM_HOST_API_KEY secret.
  id-token: write

jobs:
  publish:
    name: publish
    runs-on: runs-on=${{ github.run_id }}/image=ubuntu24-full-x64/runner=4cpu-linux-x64/spot=false/tag=sdk-publish
    # The trusted-publisher registration names this environment; its deployment
    # branch policy restricts publishes to jobs running against main.
    environment: rubygems

    steps:
      - uses: actions/checkout@v6
      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: false
          # release-gem's attestation signing shells out to `gem exec`, which the
          # RubyGems bundled with this Ruby predates.
          rubygems: latest
      - run: |-
          bundle install

      - name: Publish to RubyGems.org (trusted publishing)
        # Wraps the OIDC credential exchange + `rake release`; supersedes
        # bin/publish-gem's token-based flow. Its own await step globs
        # pkg/*.gem, but the generated Rakefile builds the gem at the repo
        # root, so we await ourselves below.
        uses: rubygems/release-gem@v1
        with:
          await-release: "false"

      - name: Await release on RubyGems.org
        run: gem exec rubygems-await ./orb-billing-*.gem
